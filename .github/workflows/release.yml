name: release

# Push a tag matching v* (e.g. v1.0.0) to cut a release: tests run, then
# goreleaser publishes a GitHub release with the source archive,
# checksums, an SBOM, and a cosign-keyless signature. Go modules need no
# registry upload — `go get` resolves the tag via the module proxy.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.13'
          cache: true

      - name: Check semantic import path
        run: |
          MAJOR="$(echo "${GITHUB_REF_NAME}" | sed -E 's/^v([0-9]+).*/\1/')"
          if [ "$MAJOR" -ge 2 ]; then
            grep -qE "^module .*/v$MAJOR$" go.mod || {
              echo "::error::module path must end in /v$MAJOR for tag ${GITHUB_REF_NAME}"; exit 1; }
          fi

      - run: go test -race -count=1 ./...

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.46.0
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.5.2

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: 'v2.17.0'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Warm the module proxy
        run: |
          GOPROXY=proxy.golang.org go list -m \
            github.com/clavenar/clavenar-go-sdk@${GITHUB_REF_NAME} || true
