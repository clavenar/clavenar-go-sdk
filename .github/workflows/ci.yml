name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  core:
    name: core (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.22', '1.23', '1.24']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '${{ matrix.go }}'
          cache: true
      - name: gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then echo "unformatted:"; echo "$files"; exit 1; fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...

  adapters:
    name: adapter ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [adapters/anthropic, adapters/openai]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - working-directory: ${{ matrix.module }}
        run: |
          go vet ./...
          go test -race -count=1 ./...

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - working-directory: examples
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: golangci-lint run ./...
      - working-directory: adapters/anthropic
        run: golangci-lint run ./...
      - working-directory: adapters/openai
        run: golangci-lint run ./...

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - working-directory: adapters/anthropic
        run: govulncheck ./...
      - working-directory: adapters/openai
        run: govulncheck ./...
